name: AudioEnv
options:
  bundleIdPrefix: com.audioenv
  deploymentTarget:
    macOS: "14.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  AudioEnv:
    type: application
    platform: macOS
    sources:
      - Sources/AudioEnv
    resources:
      - path: Sources/AudioEnv/Resources
        type: folder
    dependencies:
      - package: Sparkle
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.audioenv.app
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_ENTITLEMENTS: AudioEnv-adhoc.entitlements
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"  # Ad-hoc sign for local development
      INFOPLIST_FILE: Sources/AudioEnv/Info.plist
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
      INFOPLIST_KEY_CFBundleName: AudioEnv
      INFOPLIST_KEY_CFBundleDisplayName: AudioEnv
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
      INFOPLIST_KEY_CFBundleIconFile: audioenv
